name: Update the naughtylist

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update pipeline
        run: python -m src.main

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "Naughtylist Bot"
          git config user.email "naughtylist-bot@users.noreply.github.com"
          git add data/
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          ADDR_COUNT=$(python -c "import json; print(json.load(open('data/metadata.json'))['total_addresses'])")
          git commit -m "naughtylist updated — ${TIMESTAMP} — ${ADDR_COUNT} addresses checked twice"
          git push
